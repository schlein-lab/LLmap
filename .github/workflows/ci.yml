name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build + ctest (Ubuntu, CUDA off)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-13

      - name: Configure (CUDA off)
        run: |
          cmake -S . -B build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLMAP_ENABLE_CUDA=OFF \
            -DLLMAP_USE_NATIVE_ARCH=OFF \
            -DCMAKE_CXX_COMPILER=g++-13

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Smoke check binary
        run: |
          ./build/src/llmap --version
          ./build/src/llmap --help
